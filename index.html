<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handoo ROI - Balance Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .card-bg { background-color: #1e293b; border: 1px solid #334155; }
        .input-dark { background-color: #0f172a; border: 1px solid #334155; color: white; }
        input[type="range"] { accent-color: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center justify-center min-h-screen">

    <div class="max-w-6xl w-full card-bg rounded-3xl p-6 shadow-2xl border border-slate-700/50">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-blue-400 bg-clip-text text-transparent">Handoo: Balance Financiero</h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest">Utilidad Neta: Ingresos - Costos</p>
            </div>
            <div class="flex justify-between md:justify-end gap-8 border-l border-slate-700 md:pl-8">
                <div class="text-right">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Ganancia Mes <span id="label-mes-actual">12</span></p>
                    <p class="text-white text-xl font-bold" id="ganancia-mensual-val">$ 0</p>
                </div>
                <div class="text-right">
                    <p class="text-emerald-400 text-[10px] font-bold uppercase">Ganancia Total Acumulada</p>
                    <p class="text-emerald-400 text-2xl font-bold" id="ganancia-total-val">$ 0</p>
                </div>
            </div>
        </div>

        <div class="mb-8 p-4 bg-slate-900/50 rounded-2xl border border-slate-800">
            <canvas id="mainChart" height="90"></canvas>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-sm">
            
            <div class="space-y-4">
                <h3 class="text-blue-400 font-bold uppercase text-[10px] tracking-widest border-b border-slate-700 pb-1">Operación</h3>
                <div>
                    <div class="flex justify-between mb-1 text-xs">
                        <label>Leads / Mes</label>
                        <span class="font-bold text-blue-400" id="leads-val">500</span>
                    </div>
                    <input type="range" id="leads" min="50" max="5000" step="50" value="500" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-xs">
                        <label>Mes de Proyección</label>
                        <span class="font-bold text-slate-200" id="meses-val">12</span>
                    </div>
                    <input type="range" id="meses" min="1" max="36" step="1" value="12" class="w-full">
                </div>
            </div>

            <div class="space-y-3">
                <h3 class="text-emerald-400 font-bold uppercase text-[10px] tracking-widest border-b border-slate-700 pb-1">Comercial</h3>
                <input type="number" id="precioVenta" value="350000000" class="w-full p-2 rounded input-dark text-xs" title="Precio Venta">
                <input type="number" id="precioAlquiler" value="2500000" class="w-full p-2 rounded input-dark text-xs" title="Canon Alquiler">
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase">Gano Venta %</label>
                        <input type="number" id="tasaVenta" value="4.0" step="0.5" class="w-full p-1.5 rounded input-dark text-xs">
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase">Gano Alquiler %</label>
                        <input type="number" id="tasaAlquiler" value="0.5" step="0.1" class="w-full p-1.5 rounded input-dark text-xs">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-purple-400 font-bold uppercase text-[10px] tracking-widest border-b border-slate-700 pb-1">Conversión %</h3>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-xs">Cierre Ventas %</label>
                        <input type="number" id="convVenta" value="1.0" step="0.1" class="w-20 p-1 rounded input-dark text-xs text-center">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-xs">Cierre Alquiler %</label>
                        <input type="number" id="convAlquiler" value="4.0" step="0.1" class="w-20 p-1 rounded input-dark text-xs text-center">
                    </div>
                </div>
            </div>

            <div class="space-y-4 bg-rose-900/10 p-4 rounded-xl border border-rose-500/20">
                <h3 class="text-rose-400 font-bold uppercase text-[10px] tracking-widest border-b border-rose-900 pb-1">Costos USD</h3>
                <div>
                    <div class="flex justify-between mb-1 text-xs">
                        <label>Fijo Mensual</label>
                        <span class="text-rose-400 font-bold">$<span id="fijo-val">50</span></span>
                    </div>
                    <input type="range" id="costoFijoUSD" min="0" max="1000" step="50" value="50" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-xs">
                        <label>Variable/Lead</label>
                        <span class="text-rose-400 font-bold">$<span id="var-val">0.01</span></span>
                    </div>
                    <input type="range" id="costoVarUSD" min="0.01" max="0.20" step="0.01" value="0.01" class="w-full">
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-8 text-center text-slate-500 text-[10px] uppercase tracking-[0.2em] font-semibold">
        <p>&copy; 2026 Handoo AI · <span class="text-slate-400">Desarrollado por Miguel Riveros</span></p>
    </footer>

    <script>
        const TRM = 4100;
        let chart;

        function formatCOP(val) {
            return '$ ' + Math.floor(val).toLocaleString('es-CO');
        }

        function update() {
            const leads = parseInt(document.getElementById('leads').value);
            const mesesTotal = parseInt(document.getElementById('meses').value);
            const pVenta = parseFloat(document.getElementById('precioVenta').value);
            const pAlquiler = parseFloat(document.getElementById('precioAlquiler').value);
            const cVenta = parseFloat(document.getElementById('convVenta').value) / 100;
            const cAlquiler = parseFloat(document.getElementById('convAlquiler').value) / 100;
            const tVenta = parseFloat(document.getElementById('tasaVenta').value) / 100;
            const tAlquiler = parseFloat(document.getElementById('tasaAlquiler').value) / 100;
            const cFijoUSD = parseFloat(document.getElementById('costoFijoUSD').value);
            const cVarUSD = parseFloat(document.getElementById('costoVarUSD').value);

            document.getElementById('leads-val').innerText = leads;
            document.getElementById('meses-val').innerText = mesesTotal;
            document.getElementById('label-mes-actual').innerText = mesesTotal;
            document.getElementById('fijo-val').innerText = cFijoUSD;
            document.getElementById('var-val').innerText = cVarUSD.toFixed(2);

            let acumuladoUtilidad = 0;
            let gananciaMesActual = 0;
            const labels = [];
            const dataVentas = [];
            const dataAlquiler = [];
            const dataCostos = [];
            const dataUtilidadNeta = [];

            const costoMensual = (cFijoUSD + (leads * cVarUSD)) * TRM;

            for (let i = 1; i <= mesesTotal; i++) {
                labels.push('Mes ' + i);
                const ingresoVentaMes = (leads * cVenta) * pVenta * tVenta;
                const ingresoAlquilerMes = (leads * cAlquiler * i) * pAlquiler * tAlquiler;
                const utilidadMes = (ingresoVentaMes + ingresoAlquilerMes) - costoMensual;

                acumuladoUtilidad += utilidadMes;
                if (i === mesesTotal) gananciaMesActual = utilidadMes;

                dataVentas.push(ingresoVentaMes);
                dataAlquiler.push(ingresoAlquilerMes);
                dataCostos.push(costoMensual);
                dataUtilidadNeta.push(utilidadMes);
            }

            document.getElementById('ganancia-mensual-val').innerText = formatCOP(gananciaMesActual);
            document.getElementById('ganancia-total-val').innerText = formatCOP(acumuladoUtilidad);

            updateChart(labels, dataVentas, dataAlquiler, dataCostos, dataUtilidadNeta);
        }

        function updateChart(labels, ventas, alquiler, costos, utilidad) {
            if (chart) chart.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Utilidad Neta (Ganancia)', data: utilidad, borderColor: '#10b981', borderWidth: 4, pointRadius: 2, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' },
                        { label: 'Ingreso Ventas', data: ventas, borderColor: '#94a3b8', borderWidth: 1, borderDash: [5,5], pointRadius: 0 },
                        { label: 'Ingreso Alquiler', data: alquiler, borderColor: '#3b82f6', borderWidth: 1, borderDash: [5,5], pointRadius: 0 },
                        { label: 'Costos Totales', data: costos, borderColor: '#f43f5e', borderWidth: 1, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#64748b', callback: v => '$' + v/1e6 + 'M' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));
        update();
    </script>
</body>
</html>
